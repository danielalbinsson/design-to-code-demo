name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Lint
        run: pnpm lint
        env:
          CI: true

      - name: Typecheck
        run: pnpm typecheck
        env:
          CI: true

      - name: Install Playwright browsers
        run: pnpm --filter @acme/app exec playwright install --with-deps chromium
        env:
          CI: true

      - name: Test (Storybook stories + a11y)
        run: pnpm test
        env:
          CI: true

      - name: Build all (tokens + app)
        run: pnpm build
        env:
          CI: true

      - name: Build Storybook
        run: pnpm build-storybook
        env:
          CI: true

      - name: Publish to Chromatic
        uses: chromaui/action@v13
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: packages/acme-app/storybook-static
          storybookBaseDir: packages/acme-app
          onlyChanged: true
